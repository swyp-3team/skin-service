spring:
  application:
    name: skin-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/skin
    username: appuser
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none # Flyway가 관리하면 끄라고 하네요
    show-sql: true
    properties:
      hibernate:
        format_sql: true # SQL 보기좋게
        default_batch_fetch_size: 100  # n+1 방지

  flyway:
    enabled: true
    locations: classpath:db/migration

