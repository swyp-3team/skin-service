<!-- src/main/resources/templates/admin/index.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${pageTitle}">Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">
            <span th:text="${systemName}">Skin Service</span> Admin
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminTopNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="adminTopNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active fw-semibold" th:href="@{/admin}">홈</a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/users}" class="nav-link">회원 관리</a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/products}" class="nav-link">상품</a>
                </li>
            </ul>
            <span class="badge text-bg-dark" th:text="${userRole}">ADMIN</span>
        </div>
    </div>
</nav>

<main class="container-fluid px-4 py-4">

    <!-- 헤더 -->
    <div class="mb-4">
        <h1 class="h4 mb-1">관리자 홈</h1>
        <p class="text-secondary mb-0">서비스 핵심 지표를 확인합니다.</p>
    </div>

    <!-- KPI 카드 1줄 -->
    <div class="row g-3 mb-3">

        <!-- 오늘 신규 가입자 -->
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-secondary small">오늘 신규 가입자</div>
                    <div class="fs-4 fw-bold"
                         th:text="${dashboard.todaySignUpCount}">0</div>
                </div>
            </div>
        </div>

        <!-- 총 사용자 수 -->
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-secondary small">총 사용자 수</div>
                    <div class="fs-4 fw-bold"
                         th:text="${dashboard.totalUserCount}">0</div>
                </div>
            </div>
        </div>

        <!-- 누적 진단 수 -->
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-secondary small">누적 진단 수</div>
                    <div class="fs-4 fw-bold"
                         th:text="${dashboard.totalDiagnoses}">0</div>
                </div>
            </div>
        </div>

    </div>

    <!-- KPI 카드 2줄 -->
    <div class="row g-3">

        <!-- 전체 상품 수 -->
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-secondary small">전체 상품 수</div>
                    <div class="fs-4 fw-bold"
                         th:text="${dashboard.totalProductCount}">0</div>
                </div>
            </div>
        </div>

        <!-- 활성 상품 수 -->
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-secondary small">활성 상품 수</div>
                    <div class="fs-4 fw-bold"
                         th:text="${dashboard.activeProductCount}">0</div>
                </div>
            </div>
        </div>

    </div>

</main>

<script th:src="@{/js/bootstrap.bundle.min.js}" src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
