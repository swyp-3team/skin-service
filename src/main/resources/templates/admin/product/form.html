<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 등록</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/admin}">Layerd Admin</a>
        <ul class="navbar-nav ms-2">
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/products}">상품</a></li>
        </ul>
    </div>
</nav>

<main class="container-fluid px-3 py-3">
    <div class="row g-3">
        <aside class="col-12 col-lg-2">
            <div class="list-group">
                <a th:href="@{/admin/products}" class="list-group-item list-group-item-action">상품 목록</a>
                <a th:href="@{/admin/products/new}" class="list-group-item list-group-item-action active">상품 등록</a>
            </div>
        </aside>

        <section class="col-12 col-lg-10">
            <div class="card">
                <div class="card-header bg-white fw-semibold">상품 관리</div>
                <div class="card-body">
                    <h2 class="h6 mb-3">상품 등록</h2>

                    <form th:action="@{/admin/products}" method="post" class="row g-3">
                        <!-- 기본 정보 -->
                        <div class="col-12">
                            <label class="form-label">상품명 *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">브랜드 *</label>
                            <input type="text" name="brand" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">카테고리 *</label>
                            <select name="category" class="form-select" required>
                                <option value="">선택하세요</option>
                                <option value="TONER">TONER</option>
                                <option value="SERUM">SERUM</option>
                                <option value="CREAM">CREAM</option>
                                <option value="SUNSCREEN">SUNSCREEN</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">설명 *</label>
                            <textarea name="description" class="form-control" rows="4" required></textarea>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">이미지 URL *</label>
                            <input type="url" name="imageUrl" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">구매 URL *</label>
                            <input type="url" name="purchaseUrl" class="form-control" required>
                        </div>

                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="active" name="active" checked>
                                <label class="form-check-label" for="active">활성 상태</label>
                            </div>
                        </div>

                        <hr class="my-2">

                        <!-- 성분군 점수 TOP3 -->
                        <div class="col-12">
                            <h3 class="h6 mb-2">성분군 점수 입력 (Top 3)</h3>
                            <p class="text-secondary small mb-3">Top1, Top2, Top3만 입력합니다. 성분군은 중복 없이 선택하세요.</p>
                        </div>

                        <!-- Top1 -->
                        <div class="col-12">
                            <div class="border rounded p-3">
                                <div class="fw-semibold mb-2">Top1</div>
                                <div class="row g-2">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">성분군 *</label>
                                        <select name="groupScores[0].ingredientGroup" class="form-select" required>
                                            <option value="">선택하세요</option>
                                            <option value="ACNE">ACNE</option>
                                            <option value="SEBUM_CONTROL">SEBUM_CONTROL</option>
                                            <option value="SOOTHING">SOOTHING</option>
                                            <option value="HYDRATION">HYDRATION</option>
                                            <option value="BARRIER">BARRIER</option>
                                            <option value="BRIGHTENING">BRIGHTENING</option>
                                            <option value="TURNOVER">TURNOVER</option>
                                            <option value="ANTI_AGING">ANTI_AGING</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">점수(score) *</label>
                                        <input type="number" step="0.01" min="0" name="groupScores[0].score" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Top2 -->
                        <div class="col-12">
                            <div class="border rounded p-3">
                                <div class="fw-semibold mb-2">Top2</div>
                                <div class="row g-2">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">성분군 *</label>
                                        <select name="groupScores[1].ingredientGroup" class="form-select" required>
                                            <option value="">선택하세요</option>
                                            <option value="ACNE">ACNE</option>
                                            <option value="SEBUM_CONTROL">SEBUM_CONTROL</option>
                                            <option value="SOOTHING">SOOTHING</option>
                                            <option value="HYDRATION">HYDRATION</option>
                                            <option value="BARRIER">BARRIER</option>
                                            <option value="BRIGHTENING">BRIGHTENING</option>
                                            <option value="TURNOVER">TURNOVER</option>
                                            <option value="ANTI_AGING">ANTI_AGING</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">점수(score) *</label>
                                        <input type="number" step="0.01" min="0" name="groupScores[1].score" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Top3 -->
                        <div class="col-12">
                            <div class="border rounded p-3">
                                <div class="fw-semibold mb-2">Top3</div>
                                <div class="row g-2">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">성분군 *</label>
                                        <select name="groupScores[2].ingredientGroup" class="form-select" required>
                                            <option value="">선택하세요</option>
                                            <option value="ACNE">ACNE</option>
                                            <option value="SEBUM_CONTROL">SEBUM_CONTROL</option>
                                            <option value="SOOTHING">SOOTHING</option>
                                            <option value="HYDRATION">HYDRATION</option>
                                            <option value="BARRIER">BARRIER</option>
                                            <option value="BRIGHTENING">BRIGHTENING</option>
                                            <option value="TURNOVER">TURNOVER</option>
                                            <option value="ANTI_AGING">ANTI_AGING</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">점수(score) *</label>
                                        <input type="number" step="0.01" min="0" name="groupScores[2].score" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-primary btn-sm">등록</button>
                            <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</main>

</body>
</html>
