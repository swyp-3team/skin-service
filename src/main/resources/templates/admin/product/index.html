<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/admin}">Layerd Admin</a>
        <ul class="navbar-nav ms-2">
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/products}">상품</a></li>
        </ul>
    </div>
</nav>

<main class="container-fluid px-3 py-3">
    <div class="row g-3">
        <aside class="col-12 col-lg-2">
            <div class="list-group">
                <a th:href="@{/admin/products}" class="list-group-item list-group-item-action active">상품 목록</a>
                <a th:href="@{/admin/products/new}" class="list-group-item list-group-item-action">상품 등록</a>
            </div>
        </aside>

        <section class="col-12 col-lg-10">
            <div class="card">
                <div class="card-header bg-white fw-semibold">상품 관리</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h6 mb-0">상품 목록</h2>
                        <a th:href="@{/admin/products/new}" class="btn btn-primary btn-sm">신규 등록</a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-bordered align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>상품명</th>
                                <th style="width: 120px;">브랜드</th>
                                <th style="width: 120px;">카테고리</th>
                                <th style="width: 100px;">가격</th>
                                <th style="width: 90px;">활성</th>
                                <th style="width: 180px;">관리</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(products)}">
                                <td colspan="7" class="text-center text-secondary py-4">등록된 상품이 없습니다.</td>
                            </tr>

                            <tr th:each="p : ${products}">
                                <td th:text="${p.id}">1</td>
                                <td th:text="${p.name}">상품명</td>
                                <td th:text="${p.brand}">브랜드</td>
                                <td th:text="${p.category}">TONER</td>
                                <td th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')}">12000</td>
                                <td>
                                    <span class="badge" th:classappend="${p.active} ? ' text-bg-success' : ' text-bg-secondary'"
                                          th:text="${p.active} ? 'Y' : 'N'">Y</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button type="button"
                                                class="btn btn-outline-primary btn-sm edit-btn"
                                                data-bs-toggle="modal"
                                                data-bs-target="#editProductModal"
                                                th:attr="data-id=${p.id},
                                                         data-name=${p.name},
                                                         data-brand=${p.brand},
                                                         data-category=${p.category},
                                                         data-price=${p.price},
                                                         data-description=${p.description},
                                                         data-image-url=${p.imageUrl},
                                                         data-purchase-url=${p.purchaseUrl},
                                                         data-active=${p.active}">
                                            수정
                                        </button>

                                        <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <form id="editProductForm" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">상품 수정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label">상품명</label>
                            <input class="form-control" name="name" id="edit-name" required />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">브랜드</label>
                            <input class="form-control" name="brand" id="edit-brand" required />
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label">카테고리</label>
                            <select class="form-select" name="category" id="edit-category" required>
                                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                            </select>
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label">가격</label>
                            <input type="number" min="0" class="form-control" name="price" id="edit-price" required />
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label">활성 여부</label>
                            <select class="form-select" name="active" id="edit-active" required>
                                <option value="true">활성</option>
                                <option value="false">비활성</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">설명</label>
                            <textarea class="form-control" rows="4" name="description" id="edit-description" required></textarea>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">이미지 URL</label>
                            <input type="url" class="form-control" name="imageUrl" id="edit-image-url" required />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">구매 URL</label>
                            <input type="url" class="form-control" name="purchaseUrl" id="edit-purchase-url" required />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">취소</button>
                    <button class="btn btn-primary" type="submit">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}" src="/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = document.getElementById('editProductModal');
    const form = document.getElementById('editProductForm');

    modal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');

        form.setAttribute('action', '/admin/products/' + id + '/edit');

        document.getElementById('edit-name').value = button.getAttribute('data-name') || '';
        document.getElementById('edit-brand').value = button.getAttribute('data-brand') || '';
        document.getElementById('edit-category').value = button.getAttribute('data-category') || '';
        document.getElementById('edit-price').value = button.getAttribute('data-price') || 0;
        document.getElementById('edit-description').value = button.getAttribute('data-description') || '';
        document.getElementById('edit-image-url').value = button.getAttribute('data-image-url') || '';
        document.getElementById('edit-purchase-url').value = button.getAttribute('data-purchase-url') || '';
        document.getElementById('edit-active').value = button.getAttribute('data-active') === 'true' ? 'true' : 'false';
    });
</script>
</body>
</html>
