<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">Skin Service Admin</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">홈</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" th:href="@{/admin/products}">상품</a></li>

            <span class="badge text-bg-dark" th:text="${userRole}">ADMIN</span>

    </div>

<div class="container-fluid px-4 py-4">
    <div class="row">
        <aside class="col-12 col-lg-2 mb-3 mb-lg-0">
            <div class="list-group shadow-sm">
                <a href="#" class="list-group-item list-group-item-action active">상품 목록</a>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">상품 관리</div>
                <div class="card-body">
                    <p class="text-secondary mb-0">좌측 메뉴에서 상품 목록/등록을 선택하세요.</p>
                </div>
            </div>
        </section>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}" src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
