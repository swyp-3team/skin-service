<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/admin}">Layerd Admin</a>
        <ul class="navbar-nav ms-2">
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/products}">상품</a></li>
        </ul>
    </div>
</nav>

<main class="container-fluid px-3 py-3">
    <div class="row g-3">
        <aside class="col-12 col-lg-2">
            <div class="list-group">
                <a th:href="@{/admin/products}" class="list-group-item list-group-item-action active">상품 목록</a>
                <a th:href="@{/admin/products/new}" class="list-group-item list-group-item-action">상품 등록</a>
            </div>
        </aside>

        <section class="col-12 col-lg-10">
            <div class="card">
                <div class="card-header bg-white fw-semibold">상품 관리</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h6 mb-0">상품 목록</h2>
                        <a th:href="@{/admin/products/new}" class="btn btn-primary btn-sm">신규 등록</a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-bordered align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>상품명</th>
                                <th style="width: 120px;">브랜드</th>
                                <th style="width: 120px;">카테고리</th>
                                <th style="width: 120px;">활성여부</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td colspan="5" class="text-center text-secondary py-4">
                                    등록된 상품이 없습니다.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <p class="text-secondary small mt-3 mb-0">
                        이후 상품 데이터 연동 시 이 영역에 목록/검색/페이징을 추가하면 됩니다.
                    </p>
                </div>
            </div>
        </section>
    </div>
</main>

</body>
</html>
